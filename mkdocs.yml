site_name: FastUI
site_description: FastUI framework, build web UIs with Python decorators, compile to HTML, zero JavaScript required
site_url: https://fastui.ndugram.dev

docs_dir: docs
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference
  features:
    - content.code.annotate
    - content.code.copy
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: logo.png
  favicon: logo.png

repo_name: ndugram/fastui
repo_url: https://github.com/ndugram/fastui
extra_css:
  - stylesheets/extra.css

plugins:
  - search
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - FastUI: index.md
  - English:
    - Learn:
      - en/learn/index.md
      - en/learn/python-types.md
    - Tutorial - User Guide:
      - Tutorial:
        - en/tutorial/index.md
        - en/tutorial/first-steps.md
        - en/tutorial/components.md
        - en/tutorial/routing.md
        - en/tutorial/server-actions.md
        - en/tutorial/layout-and-navigation.md
        - en/tutorial/customization.md
        - en/tutorial/openapi.md
        - en/tutorial/hot-reload.md
        - en/tutorial/examples.md
    - Reference:
      - en/reference/index.md
      - en/reference/app.md
      - en/reference/components.md
      - en/reference/router.md
      - en/reference/openapi.md
    - About:
      - en/about/index.md
  - Russian:
    - Learn:
      - ru/learn/index.md
      - ru/learn/python-types.md
    - Tutorial - User Guide:
      - Tutorial:
        - ru/tutorial/index.md
        - ru/tutorial/first-steps.md
        - ru/tutorial/components.md
        - ru/tutorial/routing.md
        - ru/tutorial/server-actions.md
        - ru/tutorial/layout-and-navigation.md
        - ru/tutorial/customization.md
        - ru/tutorial/openapi.md
        - ru/tutorial/hot-reload.md
        - ru/tutorial/examples.md
    - Reference:
      - ru/reference/index.md
      - ru/reference/app.md
      - ru/reference/components.md
      - ru/reference/router.md
      - ru/reference/openapi.md
    - About:
      - ru/about/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ndugram/fastui
  alternate:
    - link: /
      name: en - English
    - link: /ru/
      name: ru - Russian
