name: Publish

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: version
        run: |
          ver=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if tag exists
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping build."

      - name: Generate release notes via AI
        id: release_notes
        if: steps.tag_check.outputs.exists == 'false'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^$TAG$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "$PREV_TAG..HEAD" 2>/dev/null || echo "")
          else
            CHANGES=$(git log --oneline -30 2>/dev/null || echo "Initial release")
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES="Minor fixes and improvements"
          fi

          PROMPT="Generate concise release notes in English for this FastUI release. Structure the output as bullet points grouped by category (Features, Bug Fixes, etc.). Base it on these commits:\n\n${CHANGES}"

          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg model "openai/gpt-oss-120b:free" \
              --arg prompt "$PROMPT" \
              '{model: $model, messages: [{role: "user", content: $prompt}], max_tokens: 500}')")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // ""')

          if [ -z "$AI_TEXT" ]; then
            AI_TEXT="$CHANGES"
          fi

          echo "$AI_TEXT" > release_body.md

      - uses: actions/setup-python@v5
        if: steps.tag_check.outputs.exists == 'false'
        with:
          python-version: "3.12"

      - name: Install build
        if: steps.tag_check.outputs.exists == 'false'
        run: pip install build

      - name: Build package
        if: steps.tag_check.outputs.exists == 'false'
        run: python -m build

      - name: Publish to PyPI
        if: steps.tag_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body_path: release_body.md
          make_latest: true
